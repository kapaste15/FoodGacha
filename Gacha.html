<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width+device-width,initial-scale=1.0">
        <link rel="stylesheet" href="Gacha.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
    </head>

    <body>

        <section class="home" id="home">

            <div class="hero-card">
                <nav>
                    <div class="logo">
                        <a href="index.html"> 
                            <img src="FG-1.svg" alt="FGLogo">
                        </a>
                    </div>


                    <input type="checkbox" id="menu-toggler">
                    <label for="menu-toggler" id="hamburger">
                        <i class="bi bi-list"></i>
                    </label>


                    <ul class="nav-links flex" id="nav-menu">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="Gacha.html">Gacha</a></li>
                        <li><a href="About.html">About</a></li>
                        <li class="mobile-login">
                            <a href="#" class="btn">Login</a>
                        </li>
                    </ul>

                    <div class="buttons">
                        <button class="btn">Login</button>
                    </div>
                </nav>

                <div class="hero-content">
                    <div class="hero-text">
                        <h1>hungry?</h1>
                        <p>Test your hunger and luck!</p>

                        <a href="#services" class="cta-btn" id="pull-btn">
                            Pull Now!
                        </a>
                    </div>

                    <div class="hero-image">
                        <img src="hamburbur.png" alt="gachaimage">
                    </div>
                </div>
            </div>
        </section>
         
        <section class="gacha-services" id="services">
            <div class="container">
                <div class="section-title">
                    <h2>Pick a Category</h2>
                    <p>Choose what you crave!</p>
                </div>

                <ul class="cards flex">
                    <li class="card">
                        <img src="break.jpg" alt="serviceImg">
                        <h3> Breakfast </h3>
                        <a href="https://gamemick.com/game/pGkKNM2ara">Pull Now!</a>
                    </li>
                    <li class="card">
                        <img src="lunch2.jpg" alt="serviceImg">
                        <h3>Lunch</h3>
                        <a href="https://gamemick.com/game/zkDW2NH-J-">Pull Now!</a>
                    </li>
                    <li class="card">
                        <img src="dinner.jpg" alt="serviceImg">
                        <h3>Dinner</h3>
                        <a href="https://gamemick.com/game/zkDW2NH-J-">Pull Now!</a>
                    </li>
                </ul>
            </div>
        </section>

        <script src="Navbar.js"></script>
    </body>
